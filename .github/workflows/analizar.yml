name: Analizador de Fechas EPG

on:
  workflow_dispatch: # Ejecución manual

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Librerias
        run: pip install requests
      - name: Ejecutar Analizador
        run: python analizar_fechas.py
      - name: Guardar Reporte
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reporte_fechas_epg.txt
          git commit -m "Actualización de reporte de fechas" || exit 0
          git push
