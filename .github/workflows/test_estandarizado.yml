name: Test Logos Estandarizados (Prueba)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 3. Instalar Librerías (Requests + Pillow)
        run: pip install requests Pillow

      - name: 4. Ejecutar Script de Prueba
        run: python prueba_logos_estandar.py

      - name: 5. Subir Cambios (Modo Seguro)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "TesterRobot"
          
          # Añadir archivo de URLs si existe
          [ -f urls_estandarizadas.txt ] && git add urls_estandarizadas.txt
          
          # Añadir logos solo si la carpeta tiene archivos PNG
          # El '|| true' evita que el workflow falle si no hay archivos
          if ls logos_estandar/*.png 1> /dev/null 2>&1; then
            git add logos_estandar/*.png
          fi
          
          # Commit y Push solo si hay cambios reales detectados
          if git diff --staged --quiet; then
            echo "Sin cambios o logos nuevos para subir."
          else
            git commit -m "Experimento: Logos estandarizados (400x225)"
            git push
          fi
