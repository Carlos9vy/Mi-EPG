name: Test Logos Estandarizados (Prueba)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 3. Dependencies
        run: pip install requests Pillow

      - name: 4. Run Script
        run: python prueba_logos_estandar.py

      - name: 5. Force Upload
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "TesterRobot"
          
          # Asegurar que la carpeta existe para Git
          mkdir -p logos_estandar
          touch logos_estandar/.keep
          
          # Añadir todo de forma explícita
          git add logos_estandar/*.png || true
          git add logos_estandar/.keep || true
          git add urls_estandarizadas.txt || true
          
          # Mostrar estado en logs para depuración
          git status
          
          # Hacer commit y subir
          git commit -m "Update: Logos estandarizados 400x225" || echo "Sin cambios"
          git push
