name: Actualizar EPG Filtrada

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta automáticamente cada medianoche (hora UTC)
  workflow_dispatch:      # Permite que tú lo ejecutes manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para que el robot pueda escribir en tu repositorio
    permissions:
      contents: write

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 3. Instalar librerías necesarias
        run: pip install requests

      - name: 4. Ejecutar el script de filtrado
        run: python filter_epg.py

      - name: 5. Guardar y subir los cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Añadimos el archivo generado (o cualquier cambio)
          git add epg_reducida.xml
          
          # Verificamos si hay cambios reales para evitar errores si el archivo es idéntico
          if git diff --staged --quiet; then
            echo "No hay cambios en la EPG, nada que actualizar."
          else
            git commit -m "Actualización automática de EPG: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
