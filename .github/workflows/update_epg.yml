name: Actualizar EPG Filtrada

on:
  schedule:
    - cron: '0 0 * * *' # Ejecución automática cada medianoche (UTC)
  workflow_dispatch:      # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permisos para que el robot pueda guardar los archivos en tu repositorio
    permissions:
      contents: write

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 3. Instalar librerías
        run: pip install requests

      - name: 4. Ejecutar script de filtrado y optimización
        run: python filter_epg.py

      - name: 5. Guardar y subir cambios (XML, GZ y Errores)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Agregamos los tres archivos resultantes
          git add epg_reducida.xml epg_reducida.xml.gz errores_canales.txt
          
          # Verificamos si hay cambios antes de hacer el commit
          if git diff --staged --quiet; then
            echo "No hay cambios nuevos para subir."
          else
            git commit -m "Actualización EPG optimizada: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
