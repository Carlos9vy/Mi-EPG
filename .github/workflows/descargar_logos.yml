name: Robot Generador de Logos y URLs

on:
  workflow_dispatch: # Se ejecuta manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    # Permisos necesarios para que el robot pueda escribir archivos en tu repo
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar librerías
        run: pip install requests

      - name: Ejecutar script de procesamiento
        run: |
          python - <<EOF
          import os
          import requests
          import urllib.parse

          # --- CONFIGURACIÓN ---
          # El robot detecta automáticamente tu usuario y repo
          repo_full = os.getenv('GITHUB_REPOSITORY') 
          lista_entrada = "lista_logos_canales.txt"
          carpeta_logos = "logos"
          lista_salida = "mis_nuevas_urls.txt"
          
          if not os.path.exists(carpeta_logos):
              os.makedirs(carpeta_logos)

          nuevas_lineas = []

          with open(lista_entrada, 'r', encoding='utf-8') as f:
              for linea in f:
                  if "->" in linea:
                      partes = linea.split("->")
                      tvg_id = partes[0].strip()
                      url_original = partes[1].strip()
                      
                      # Nombre de archivo limpio para evitar errores en la TV LG
                      nombre_archivo = f"{tvg_id}.png".replace(" ", "_")
                      ruta_archivo = os.path.join(carpeta_logos, nombre_archivo)
                      
                      try:
                          print(f"Descargando: {tvg_id}")
                          r = requests.get(url_original, timeout=15)
                          if r.status_code == 200:
                              with open(ruta_archivo, 'wb') as img:
                                  img.write(r.content)
                              
                              # Generamos la URL RAW de tu GitHub
                              # Reemplazamos caracteres raros para que la URL sea válida
                              url_raw = f"https://raw.githubusercontent.com/{repo_full}/main/{carpeta_logos}/{urllib.parse.quote(nombre_archivo)}"
                              nuevas_lineas.append(f"{tvg_id} -> {url_raw}\n")
                      except Exception as e:
                          print(f"Error con {tvg_id}: {e}")

          # Guardar el nuevo archivo con todas las URLs juntas
          with open(lista_salida, 'w', encoding='utf-8') as f_out:
              f_out.writelines(nuevas_lineas)
          EOF

      - name: Subir cambios al repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "LogoRobot"
          git add logos/*.png mis_nuevas_urls.txt
          git commit -m "Robot: Logos descargados y lista de URLs generada" || exit 0
          git push
